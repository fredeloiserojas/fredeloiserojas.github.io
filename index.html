<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prediktor 4D - 10 Angka</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background: linear-gradient(145deg, #0b0e1a, #1a1f2f);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .card {
            background: rgba(26, 31, 47, 0.92);
            backdrop-filter: blur(8px);
            max-width: 820px;
            width: 100%;
            border-radius: 40px;
            padding: 30px 25px 35px;
            border: 1px solid #f1c40f30;
            color: #f0ece3;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.9);
        }
        h1 {
            text-align: center;
            font-weight: 600;
            font-size: 2rem;
            color: #f7e05e;
            text-shadow: 0 0 20px #f1c40f70;
            letter-spacing: 2px;
        }
        .sub {
            text-align: center;
            font-size: 0.8rem;
            color: #a7a9be;
            margin-bottom: 22px;
            border-bottom: 1px dashed #f1c40f30;
            padding-bottom: 14px;
        }
        .input-area {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .input-area input {
            flex: 2;
            padding: 16px 18px;
            border-radius: 60px;
            border: 1px solid #3d455f;
            background: #0d1020;
            color: #f0ece3;
            font-size: 1.3rem;
            text-align: center;
            letter-spacing: 6px;
            outline: none;
            font-weight: 700;
        }
        .input-area input:focus {
            border-color: #f1c40f;
            box-shadow: 0 0 20px #f1c40f20;
        }
        .input-area button {
            flex: 1;
            padding: 16px 20px;
            border-radius: 60px;
            border: none;
            background: #f1c40f;
            color: #0b0e1a;
            font-weight: 800;
            cursor: pointer;
            font-size: 1.1rem;
            transition: 0.15s;
            min-width: 120px;
        }
        .input-area button:hover {
            background: #f7d44a;
            transform: scale(1.02);
        }

        .btn-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin: 12px 0 22px;
        }
        .btn-group button {
            flex: 1;
            padding: 14px 18px;
            border-radius: 60px;
            border: 1px solid #3d455f;
            background: #20273d;
            color: #f0ece3;
            font-weight: 700;
            cursor: pointer;
            font-size: 0.95rem;
            transition: 0.1s;
            min-width: 100px;
        }
        .btn-group button:active {
            transform: translateY(4px);
        }
        .btn-primary {
            background: #f1c40f !important;
            color: #0b0e1a !important;
            border-color: #f7d44a !important;
            box-shadow: 0 6px 0 #9e7d0a;
        }
        .btn-secondary {
            background: #2a3350 !important;
            border-color: #4a5477 !important;
        }

        /* Tabel prediksi */
        .table-wrap {
            overflow-x: auto;
            margin-top: 12px;
            border-radius: 24px;
            border: 1px solid #2a3350;
            background: #0d1020;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
            min-width: 600px;
        }
        th {
            background: #1a1f2f;
            color: #f7e05e;
            padding: 14px 8px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.7rem;
            border-bottom: 2px solid #f1c40f40;
        }
        td {
            padding: 12px 6px;
            text-align: center;
            border-bottom: 1px solid #1f263b;
            font-family: 'Courier New', monospace;
            font-weight: 500;
        }
        tr:last-child td {
            border-bottom: none;
        }
        tr:hover td {
            background: #1a1f2f50;
        }
        .col-main {
            font-size: 1.2rem;
            font-weight: 700;
            color: #f7e05e;
            letter-spacing: 3px;
        }
        .col-mistik {
            color: #b48aff;
        }
        .col-index {
            color: #6fcbff;
        }
        .col-tesson {
            color: #ffb07c;
        }
        .no-data {
            text-align: center;
            padding: 30px;
            color: #6a7290;
            font-style: italic;
        }

        .footer-note {
            font-size: 0.7rem;
            text-align: center;
            color: #6a7290;
            margin-top: 24px;
            border-top: 1px solid #1f263b;
            padding-top: 18px;
        }
        .footer-note span {
            color: #f1c40f90;
        }

        @media (max-width: 600px) {
            .card {
                padding: 18px 14px;
            }
            h1 {
                font-size: 1.6rem;
            }
            .input-area input {
                font-size: 1rem;
                letter-spacing: 3px;
                padding: 14px;
            }
            .input-area button {
                font-size: 0.9rem;
                padding: 14px;
            }
            th,
            td {
                padding: 10px 4px;
                font-size: 0.75rem;
            }
            .col-main {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>🧿 PREDIKSI 4D</h1>
        <div class="sub">10 Angka • Berbasis Result • Mistik • Index • Tesson</div>

        <!-- Input Result -->
        <div class="input-area">
            <input type="text" id="resultInput" placeholder="0000" maxlength="4" value="1234" />
            <button id="processBtn">▶ Proses & Prediksi</button>
        </div>

        <!-- Tombol -->
        <div class="btn-group">
            <button class="btn-primary" id="randomBtn">🎲 Generate Acak</button>
            <button class="btn-secondary" id="resetBtn">⟲ Reset</button>
        </div>

        <!-- Tabel 10 Prediksi -->
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>🔢 Angka</th>
                        <th>🔮 Mistik</th>
                        <th>📌 Index</th>
                        <th>🧩 Tesson</th>
                    </tr>
                </thead>
                <tbody id="predictionBody">
                    <tr><td colspan="5" class="no-data">Masukkan angka result lalu klik Proses</td></tr>
                </tbody>
            </table>
        </div>

        <div class="footer-note">
            ⚡ <span>Hanya hiburan</span> • Prediksi tidak menjamin kemenangan • Hasil undian murni acak
        </div>
    </div>

    <script>
        (function() {
            // ----- KAMUS -----
            const MISTIK_MAP = { '0': '8', '1': '6', '2': '4', '3': '7', '4': '2', '5': '9', '6': '1', '7': '3', '8': '0',
                '9': '5' };
            const INDEX_MAP = { '0': '5', '1': '6', '2': '7', '3': '8', '4': '9', '5': '0', '6': '1', '7': '2', '8': '3',
                '9': '4' };

            // ----- ELEMEN -----
            const resultInput = document.getElementById('resultInput');
            const processBtn = document.getElementById('processBtn');
            const randomBtn = document.getElementById('randomBtn');
            const resetBtn = document.getElementById('resetBtn');
            const tbody = document.getElementById('predictionBody');

            // ----- FUNGSI BANTU -----
            function pad4(str) {
                let s = str.replace(/\D/g, '');
                if (s.length === 0) s = '0';
                while (s.length < 4) s = '0' + s;
                return s.slice(0, 4);
            }

            function mistikAngka(angka4) {
                let hasil = '';
                for (let ch of angka4) hasil += (MISTIK_MAP[ch] || ch);
                return hasil;
            }

            function indexAngka(angka4) {
                let hasil = '';
                for (let ch of angka4) hasil += (INDEX_MAP[ch] || ch);
                return hasil;
            }

            function tessonAngka(angka4) {
                const lastTwo = angka4.slice(-2);
                if (lastTwo.length !== 2) return '?';
                const sum = parseInt(lastTwo[0]) + parseInt(lastTwo[1]);
                return (sum % 10) + 1;
            }

            // ----- GENERATE 10 PREDIKSI dari result -----
            function generatePredictions(result4) {
                const raw = pad4(result4);
                const prediksi = [];

                // 1. Angka asli (result)
                prediksi.push(raw);

                // 2. Mistik dari result
                prediksi.push(mistikAngka(raw));

                // 3. Index dari result
                prediksi.push(indexAngka(raw));

                // 4. Operasi matematika sederhana
                const asInt = parseInt(raw);
                // +1, -1, +10, -10, +100, -100, +1000, -1000 (mod 10000)
                const operasi = [1, -1, 10, -10, 100, -100, 1000, -1000];
                for (let op of operasi) {
                    let val = (asInt + op) % 10000;
                    if (val < 0) val += 10000;
                    let str = val.toString().padStart(4, '0');
                    // Hindari duplikat
                    if (!prediksi.includes(str)) {
                        prediksi.push(str);
                    }
                }

                // 5. Jika masih kurang dari 10, tambahkan random
                while (prediksi.length < 10) {
                    let rand = '';
                    for (let i = 0; i < 4; i++) rand += Math.floor(Math.random() * 10);
                    if (!prediksi.includes(rand)) {
                        prediksi.push(rand);
                    }
                }

                // Potong ke 10
                return prediksi.slice(0, 10);
            }

            // ----- RENDER TABLE -----
            function renderPredictions(predList) {
                if (!predList || predList.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="5" class="no-data">Tidak ada prediksi</td></tr>`;
                    return;
                }

                let html = '';
                predList.forEach((angka, idx) => {
                    const mistik = mistikAngka(angka);
                    const index = indexAngka(angka);
                    const tesson = tessonAngka(angka);
                    html += `
                        <tr>
                            <td>${idx + 1}</td>
                            <td class="col-main">${angka}</td>
                            <td class="col-mistik">${mistik}</td>
                            <td class="col-index">${index}</td>
                            <td class="col-tesson">${tesson}</td>
                        </tr>
                    `;
                });
                tbody.innerHTML = html;
            }

            // ----- PROSES DARI INPUT -----
            function processFromInput() {
                const val = resultInput.value.trim();
                const angka = pad4(val);
                resultInput.value = angka; // tampilkan yg sudah diformat
                const preds = generatePredictions(angka);
                renderPredictions(preds);
            }

            // ----- GENERATE RANDOM (acak murni) -----
            function generateRandom() {
                let rand = '';
                for (let i = 0; i < 4; i++) rand += Math.floor(Math.random() * 10);
                resultInput.value = rand;
                const preds = generatePredictions(rand);
                renderPredictions(preds);
            }

            // ----- RESET -----
            function resetAll() {
                resultInput.value = '0000';
                tbody.innerHTML = `<tr><td colspan="5" class="no-data">Masukkan angka result lalu klik Proses</td></tr>`;
            }

            // ----- EVENT -----
            processBtn.addEventListener('click', processFromInput);
            randomBtn.addEventListener('click', generateRandom);
            resetBtn.addEventListener('click', resetAll);

            // Auto generate pertama kali
            // Biarkan kosong, user harus klik Proses atau Random
            // Tapi kita isi default 1234 lalu proses
            resultInput.value = '1234';
            processFromInput();
        })();
    </script>

</body>
</html>
